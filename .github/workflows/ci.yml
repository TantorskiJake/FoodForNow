name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test

  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval \"db.runCommand({ ping: 1 })\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      JWT_SECRET: ci-jwt-secret-not-for-production-use-32b
      MONGO_URI: mongodb://127.0.0.1:27017/foodfornow
      NODE_ENV: development
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Start API and Vite
        run: |
          npm run start -w foodfornow-backend > /tmp/backend.log 2>&1 &
          npm run dev -w foodfornow-frontend > /tmp/vite.log 2>&1 &
          npx wait-on http://127.0.0.1:3001 http://127.0.0.1:5173 -t 120000

      - run: npm run e2e:smoke

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-server-logs
          path: |
            /tmp/backend.log
            /tmp/vite.log
